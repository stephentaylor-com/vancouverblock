<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E1E1E"/>
      <stop offset="100%" stop-color="#141414"/>
    </linearGradient>
    <linearGradient id="bezel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C9A472"/>
      <stop offset="40%" stop-color="#8A6A3F"/>
      <stop offset="100%" stop-color="#6B5130"/>
    </linearGradient>
    <linearGradient id="bezelInner" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#B8956A"/>
      <stop offset="100%" stop-color="#9A7B52"/>
    </linearGradient>
    <linearGradient id="face" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#FAF6EF"/>
      <stop offset="100%" stop-color="#E8DDC8"/>
    </linearGradient>
    <radialGradient id="faceSheen" cx="0.4" cy="0.35" r="0.5">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="22" fill="url(#bg)"/>

  <!-- Subtle radial glow behind clock -->
  <circle cx="64" cy="64" r="56" fill="#B8956A" opacity="0.06"/>

  <!-- Outer decorative ring (terracotta surround) -->
  <circle cx="64" cy="64" r="54" fill="none" stroke="#8A6A3F" stroke-width="1" opacity="0.3"/>

  <!-- Corner ornaments (four small diamonds at diagonals suggesting the square stone housing) -->
  <rect x="16" y="16" width="6" height="6" rx="1" transform="rotate(45 19 19)" fill="#8A6A3F" opacity="0.25"/>
  <rect x="106" y="16" width="6" height="6" rx="1" transform="rotate(45 109 19)" fill="#8A6A3F" opacity="0.25"/>
  <rect x="16" y="106" width="6" height="6" rx="1" transform="rotate(45 19 109)" fill="#8A6A3F" opacity="0.25"/>
  <rect x="106" y="106" width="6" height="6" rx="1" transform="rotate(45 109 109)" fill="#8A6A3F" opacity="0.25"/>

  <!-- Bronze bezel outer -->
  <circle cx="64" cy="64" r="48" fill="url(#bezel)"/>

  <!-- Bezel bevel highlight -->
  <circle cx="64" cy="64" r="48" fill="none" stroke="#D4C9B4" stroke-width="0.8" opacity="0.4"/>

  <!-- Bronze bezel inner shadow -->
  <circle cx="64" cy="64" r="44" fill="#171717" opacity="0.15"/>

  <!-- Inner bezel ring -->
  <circle cx="64" cy="64" r="43" fill="url(#bezelInner)"/>
  <circle cx="64" cy="64" r="43" fill="none" stroke="#6B5130" stroke-width="0.6" opacity="0.5"/>

  <!-- Clock face -->
  <circle cx="64" cy="64" r="40" fill="url(#face)"/>
  <circle cx="64" cy="64" r="40" fill="url(#faceSheen)"/>

  <!-- Minute track (subtle outer ring of dots) -->
  <circle cx="64" cy="64" r="37" fill="none" stroke="#D4C9B4" stroke-width="0.5" opacity="0.6"/>

  <!-- Hour markers — 12 positions, bold at cardinal points -->
  <!-- 12 o'clock -->
  <rect x="62.5" y="27" width="3" height="8" rx="1" fill="#3D2E1A"/>
  <!-- 1 -->
  <rect x="62.5" y="28" width="1.8" height="5" rx="0.5" fill="#8A6A3F" opacity="0.7" transform="rotate(30 64 64)"/>
  <!-- 2 -->
  <rect x="62.5" y="28" width="1.8" height="5" rx="0.5" fill="#8A6A3F" opacity="0.7" transform="rotate(60 64 64)"/>
  <!-- 3 o'clock -->
  <rect x="93" y="62.5" width="8" height="3" rx="1" fill="#3D2E1A"/>
  <!-- 4 -->
  <rect x="62.5" y="28" width="1.8" height="5" rx="0.5" fill="#8A6A3F" opacity="0.7" transform="rotate(120 64 64)"/>
  <!-- 5 -->
  <rect x="62.5" y="28" width="1.8" height="5" rx="0.5" fill="#8A6A3F" opacity="0.7" transform="rotate(150 64 64)"/>
  <!-- 6 o'clock -->
  <rect x="62.5" y="93" width="3" height="8" rx="1" fill="#3D2E1A"/>
  <!-- 7 -->
  <rect x="62.5" y="28" width="1.8" height="5" rx="0.5" fill="#8A6A3F" opacity="0.7" transform="rotate(210 64 64)"/>
  <!-- 8 -->
  <rect x="62.5" y="28" width="1.8" height="5" rx="0.5" fill="#8A6A3F" opacity="0.7" transform="rotate(240 64 64)"/>
  <!-- 9 o'clock -->
  <rect x="27" y="62.5" width="8" height="3" rx="1" fill="#3D2E1A"/>
  <!-- 10 -->
  <rect x="62.5" y="28" width="1.8" height="5" rx="0.5" fill="#8A6A3F" opacity="0.7" transform="rotate(300 64 64)"/>
  <!-- 11 -->
  <rect x="62.5" y="28" width="1.8" height="5" rx="0.5" fill="#8A6A3F" opacity="0.7" transform="rotate(330 64 64)"/>

  <!-- Hour hand (pointing to ~10) -->
  <line x1="64" y1="64" x2="45" y2="38" stroke="#1A1410" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Minute hand (pointing to ~2) -->
  <line x1="64" y1="64" x2="81" y2="36" stroke="#1A1410" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Center cap -->
  <circle cx="64" cy="64" r="3.5" fill="#3D2E1A"/>
  <circle cx="64" cy="64" r="2" fill="#8A6A3F"/>
  <circle cx="64" cy="64" r="1" fill="#C9A472"/>
</svg>
